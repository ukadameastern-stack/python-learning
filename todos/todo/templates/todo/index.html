<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo home page</title>
</head>
<body>
    <h1>Welcome to the todo's Page!</h1> 
    <a href="{% url 'add_todo' %}">Add a new todo</a>   
    <ul>
        {% for todo in todos %}
            <a href="{% url 'todo_detail' todo.id %}">
                <li>{{ todo.todo }}</li>
            </a>
        {% endfor %}
    </ul>
</body>
</html>
