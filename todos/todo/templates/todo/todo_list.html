<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo home page</title>
</head>
<body>
    <h1>Welcome to the todo's Page! From: todo_list.html</h1> 
    <a href="{% url 'add_todo' %}">Add a new todo</a>   
    <ul>
        {% for todo in todo_list %}
            <li>
                <a href="{% url 'todo_detail' todo.id %}">{{ todo.todo }}</a><br>
                <a href="{% url 'todo_update' todo.id %}">Edit</a><br>
            </li>
            
        {% endfor %}
    </ul>
</body>
</html>
